<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Principles — Ray Dalio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F1ECE0;
    --bg-soft: #E8E1D1;
    --ink: #1A1A1A;
    --ink-soft: #4A4A4A;
    --ink-mute: #8A8378;
    --accent: #C75A1F;
    --line: #1A1A1A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle paper noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.012) 1px, transparent 1px),
      radial-gradient(circle at 70% 70%, rgba(0,0,0,0.012) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    pointer-events: none;
    z-index: 1;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 1100px;
    height: 100vh;
    max-height: 760px;
    padding: 0 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .card {
    position: absolute;
    inset: 0;
    margin: auto;
    padding: 72px 80px 88px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
  }

  .card.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 56px;
  }

  .eyebrow .divider {
    width: 1px;
    height: 11px;
    background: var(--ink-mute);
    opacity: 0.6;
  }

  .eyebrow .section {
    color: var(--accent);
  }

  /* Card number */
  .card-number {
    position: absolute;
    top: 72px;
    right: 80px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
  }

  .card-number .total {
    opacity: 0.5;
  }

  /* Quote card */
  .quote-mark {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 180px;
    line-height: 0.7;
    color: var(--accent);
    font-weight: 800;
    margin-bottom: 8px;
    margin-left: -8px;
    user-select: none;
  }

  .quote-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.25;
    letter-spacing: -0.015em;
    color: var(--ink);
    max-width: 820px;
    margin-top: 12px;
  }

  .quote-text .highlight {
    color: var(--accent);
    font-style: italic;
    font-weight: 600;
  }

  .quote-attribution {
    margin-top: auto;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .quote-attribution::before {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--accent);
  }

  /* Concept card */
  .concept-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .concept-label::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--accent);
  }

  .concept-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 1.02;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 32px;
    max-width: 880px;
  }

  .concept-title .accent {
    color: var(--accent);
  }

  .concept-body {
    font-family: 'Inter', sans-serif;
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 760px;
    font-weight: 400;
  }

  .concept-body strong {
    color: var(--ink);
    font-weight: 600;
  }

  .concept-list {
    list-style: none;
    margin-top: 8px;
    max-width: 780px;
  }

  .concept-list li {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 500;
    font-size: 24px;
    line-height: 1.4;
    color: var(--ink);
    padding: 12px 0 12px 44px;
    position: relative;
    border-top: 1px solid rgba(26,26,26,0.1);
    letter-spacing: -0.01em;
  }

  .concept-list li:last-child {
    border-bottom: 1px solid rgba(26,26,26,0.1);
  }

  .concept-list li::before {
    content: counter(item, decimal-leading-zero);
    counter-increment: item;
    position: absolute;
    left: 0;
    top: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .concept-list {
    counter-reset: item;
  }

  .concept-list li .accent-word {
    color: var(--accent);
  }

  .concept-example {
    margin-top: 28px;
    padding: 18px 24px 18px 26px;
    border-left: 2px solid var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
    font-style: italic;
    max-width: 720px;
    font-weight: 400;
  }

  .concept-example::before {
    content: 'EXAMPLE';
    display: block;
    font-style: normal;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .concept-example.note::before {
    content: 'NOTE';
  }

  .concept-formula {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 44px;
    line-height: 1.2;
    color: var(--ink);
    margin-top: 8px;
    margin-bottom: 28px;
    letter-spacing: -0.02em;
  }

  .concept-formula .op {
    color: var(--accent);
    margin: 0 12px;
  }

  /* Navigation */
  .nav {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 24px;
    z-index: 10;
  }

  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
  }

  .nav-btn:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .nav-btn:disabled:hover {
    background: transparent;
    color: var(--ink);
  }

  .nav-btn svg {
    width: 14px;
    height: 14px;
  }

  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
    max-width: 380px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink);
    opacity: 0.18;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    padding: 0;
  }

  .dot:hover {
    opacity: 0.5;
  }

  .dot.active {
    background: var(--accent);
    opacity: 1;
    width: 22px;
    border-radius: 3px;
  }

  /* Footer brand */
  .brand {
    position: fixed;
    bottom: 32px;
    left: 32px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    z-index: 10;
  }

  .brand-counter {
    position: fixed;
    bottom: 32px;
    right: 32px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    z-index: 10;
    font-variant-numeric: tabular-nums;
  }

  /* Decorative corner mark */
  .corner-mark {
    position: absolute;
    top: 72px;
    left: 80px;
    width: 24px;
    height: 24px;
    pointer-events: none;
  }

  .corner-mark::before,
  .corner-mark::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }

  .corner-mark::before {
    width: 100%;
    height: 1.5px;
    top: 0;
  }

  .corner-mark::after {
    width: 1.5px;
    height: 100%;
    left: 0;
  }

  @media (max-width: 768px) {
    .stage { padding: 0 20px; max-height: none; }
    .card { padding: 56px 28px 88px; }
    .card-number { top: 56px; right: 28px; }
    .corner-mark { top: 56px; left: 28px; }
    .quote-mark { font-size: 110px; }
    .quote-text { font-size: 24px; }
    .concept-title { font-size: 34px; }
    .concept-body { font-size: 16px; }
    .concept-list li { font-size: 18px; padding-left: 36px; }
    .concept-formula { font-size: 28px; }
    .eyebrow { font-size: 10px; margin-bottom: 36px; }
    .brand, .brand-counter { display: none; }
  }
</style>
</head>
<body>

<div class="stage">
  <!-- Cards inject here -->
  <div id="card-container"></div>
</div>

<div class="brand">Principles · Ray Dalio</div>

<div class="nav">
  <button class="nav-btn" id="prev" aria-label="Previous">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="next" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

  { type: 'concept', section: 'Hire Right', label: 'Priorities',
    title: 'The <span class="accent">Three C\'s</span>.',
    list: [
      '<span class="accent-word">Character</span>',
      '<span class="accent-word">Common sense</span>',
      '<span class="accent-word">Creativity</span>'
    ],
    body: 'Before skills.',
    example: 'Values and abilities rarely change. Skills can be acquired in a limited amount of time. Hire for who you want to share your life with — not just the first job they\'ll do.' },

  // 35
  { type: 'concept', section: 'Perceive Problems', label: 'Parable',
    title: 'The frog in <span class="accent">boiling water</span>.',
    body: 'Throw a frog into boiling water and it jumps out. Put it in room-temperature water and slowly bring it to a boil — it stays until it dies.',
    example: 'People get slowly used to unacceptable things that would shock them if seen with fresh eyes.' },

  // 36
  { type: 'quote', section: 'Do What You Set Out',
    quote: 'Success consists of going from failure to failure <span class="highlight">without loss of enthusiasm</span>.',
    attribution: 'Winston Churchill' }
];

const BOOK = 'Principles';
const container = document.getElementById('card-container');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const counter = document.getElementById('counter');

let current = 0;

function renderCard(card, idx) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.index = idx;

  const num = String(idx + 1).padStart(2, '0');
  const total = String(cards.length).padStart(2, '0');

  let inner = `
    <div class="corner-mark"></div>
    <div class="card-number">${num} <span class="total">/ ${total}</span></div>
    <div class="eyebrow">
      <span>${BOOK}</span>
      <span class="divider"></span>
      <span class="section">${card.section}</span>
    </div>
  `;

  if (card.type === 'quote') {
    inner += `
      <div class="quote-mark">"</div>
      <div class="quote-text">${card.quote}</div>
      <div class="quote-attribution">${card.attribution}</div>
    `;
  } else {
    inner += `<div class="concept-label">${card.label || 'Concept'}</div>`;
    inner += `<div class="concept-title">${card.title}</div>`;
    if (card.formula) {
      inner += `<div class="concept-formula">${card.formula}</div>`;
    }
    if (card.body) {
      inner += `<div class="concept-body">${card.body}</div>`;
    }
    if (card.list) {
      inner += `<ol class="concept-list">`;
      card.list.forEach(item => {
        inner += `<li>${item}</li>`;
      });
      inner += `</ol>`;
    }
    if (card.example) {
      inner += `<div class="concept-example">${card.example}</div>`;
    }
  }

  el.innerHTML = inner;
  return el;
}

// Build all cards
cards.forEach((card, idx) => {
  container.appendChild(renderCard(card, idx));
});

// Build dots
cards.forEach((_, idx) => {
  const dot = document.createElement('button');
  dot.className = 'dot';
  dot.setAttribute('aria-label', `Go to card ${idx + 1}`);
  dot.addEventListener('click', () => goTo(idx));
  dotsEl.appendChild(dot);
});

function update() {
  document.querySelectorAll('.card').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === cards.length - 1;
  const num = String(current + 1).padStart(2, '0');
  const total = String(cards.length).padStart(2, '0');
  counter.textContent = `${num} / ${total}`;
}

function goTo(idx) {
  if (idx < 0 || idx >= cards.length) return;
  current = idx;
  update();
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  if (e.key === 'End') { e.preventDefault(); goTo(cards.length - 1); }
});

// Touch swipe support
let touchStartX = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) next();
    else prev();
  }
});

update();
</script>
</body>
</html>
