<svg xmlns="http://www.w3.org/2000/svg" width="1293" height="670" viewBox="0 0 1293 670" role="img" aria-labelledby="title desc">
  <title id="title">Transformers sequence-to-sequence translation diagram</title>
  <desc id="desc">Vector recreation of a transformer translation pipeline showing French input tokenization through encoder and decoder to English output probabilities and decoded words.</desc>
  <defs>
    <style>
      .bg{fill:#f2efe9}
      .title{font:500 58px 'Plus Jakarta Sans',system-ui,sans-serif;fill:#1a1a18}
      .label{font:400 30px 'Plus Jakarta Sans',system-ui,sans-serif;fill:#1a1a18}
      .small{font:500 18px 'Plus Jakarta Sans',system-ui,sans-serif;fill:#1a1a18}
      .mid{font:500 20px 'Plus Jakarta Sans',system-ui,sans-serif;fill:#1a1a18}
      .tiny{font:500 13px 'Plus Jakarta Sans',system-ui,sans-serif;fill:#1a1a18}
      .mono{font:700 22px 'JetBrains Mono',monospace;fill:#1a1a18}
      .mono-sm{font:700 20px 'JetBrains Mono',monospace;fill:#1a1a18}
      .panel{fill:#ffffff;stroke:#a8a8a0;stroke-width:2}
      .dash{fill:none;stroke:#a8a8a0;stroke-width:2;stroke-dasharray:3 4}
      .encoder{fill:#0ea5e9;fill-opacity:.22;stroke:#6b6b65;stroke-width:2}
      .decoder{fill:#f59e0b;fill-opacity:.26;stroke:#6b6b65;stroke-width:2}
      .soft{fill:#10b981;fill-opacity:.18;stroke:#6b6b65;stroke-width:2}
      .embed{fill:#f43f5e;fill-opacity:.12;stroke:#6b6b65;stroke-width:2}
      .word{fill:#8b5cf6;fill-opacity:.12;stroke:#6b6b65;stroke-opacity:.45;stroke-width:2}
      .num{fill:#bdbdbd;stroke:#6b6b65;stroke-opacity:.35;stroke-width:2}
      .word-strong{fill:#8b5cf6;fill-opacity:.28;stroke:#6b6b65;stroke-opacity:.3;stroke-width:2}
      .blue-outline{fill:none;stroke:#0756a9;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .blue-path{fill:none;stroke:#0756a9;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .blue-thin{fill:none;stroke:#0756a9;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .dot{fill:#0756a9}
      .arrow{stroke:#1a1a18;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .connector{stroke:#a8a8a0;stroke-width:2;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a18"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".08"/>
    </filter>
  </defs>

  <rect class="bg" width="1293" height="670"/>

  <text x="29" y="62" class="title">Transformers</text>
  <text x="24" y="140" class="label">Translation:</text>
  <text x="24" y="180" class="label">sequence-to-sequence task</text>

  <g filter="url(#softShadow)">
    <path class="panel" d="M63 302H375V380H296V398H148V380H63Z"/>
    <text x="78" y="337" class="mono-sm">J'aime l'apprentissage</text>
    <text x="78" y="365" class="mono-sm">automatique</text>
  </g>

  <g filter="url(#softShadow)">
    <path class="panel" d="M34 410H152V464H34Z"/>
    <text x="63" y="447" class="mono-sm">J’aime</text>
    <path class="panel" d="M115 428H332V482H115Z"/>
    <text x="122" y="465" class="mono-sm">l'apprentissage</text>
    <path class="panel" d="M230 457H405V511H230Z"/>
    <text x="243" y="493" class="mono-sm">automatique</text>
  </g>
  <path class="connector" d="M75 397L148 428M295 380L371 397L333 428M164 482L208 525M285 511L238 525"/>

  <rect x="31" y="525" width="383" height="83" rx="14" fill="#ffffff" stroke="#0756a9" stroke-width="6"/>
  <rect x="52" y="540" width="100" height="54" class="num"/>
  <rect x="169" y="540" width="100" height="54" class="num"/>
  <rect x="286" y="540" width="100" height="54" class="num"/>
  <text x="76" y="575" class="mono">2345</text>
  <text x="193" y="575" class="mono">3425</text>
  <text x="310" y="575" class="mono">3853</text>

  <path class="blue-path" d="M415 567H480V611H561"/>
  <circle class="dot" cx="561" cy="611" r="17"/>
  <circle class="dot" cx="704" cy="611" r="17"/>
  <text x="600" y="623" class="mid">Inputs</text>

  <rect x="482" y="273" width="139" height="201" rx="10" class="encoder"/>
  <text x="509" y="382" class="mid">Encoder</text>
  <path class="blue-path" d="M561 611V421"/>
  <circle class="dot" cx="561" cy="421" r="17"/>
  <path class="blue-thin" d="M551 319V257H632V324H646"/>
  <circle class="dot" cx="551" cy="319" r="17"/>
  <rect x="516" y="525" width="94" height="38" rx="6" class="embed"/>
  <text x="535" y="548" class="tiny">Embedding</text>

  <rect x="644" y="178" width="139" height="296" rx="10" class="decoder"/>
  <path class="blue-path" d="M704 611V421"/>
  <circle class="dot" cx="704" cy="421" r="17"/>
  <rect x="656" y="525" width="94" height="38" rx="6" class="embed"/>
  <text x="675" y="548" class="tiny">Embedding</text>
  <rect x="651" y="294" width="124" height="64" rx="10" fill="#f2efe9" stroke="#0756a9" stroke-width="5"/>
  <text x="669" y="331" class="mid">Decoder</text>

  <path class="blue-path" d="M704 223V88"/>
  <circle class="dot" cx="704" cy="223" r="17"/>
  <circle class="dot" cx="704" cy="88" r="17"/>
  <text x="702" y="32" class="mid">Output</text>
  <path class="arrow" d="M704 80V41"/>

  <rect x="655" y="111" width="95" height="55" rx="5" class="soft"/>
  <text x="672" y="136" class="tiny">Softmax</text>
  <text x="682" y="155" class="tiny">output</text>

  <path class="dash" d="M703 598H802V76H704"/>

  <path class="blue-thin" d="M704 88H762V116H805"/>
  <rect x="805" y="72" width="472" height="84" rx="14" fill="#8b5cf6" fill-opacity=".16" stroke="#0756a9" stroke-width="6"/>
  <rect x="826" y="88" width="98" height="54" class="word-strong"/>
  <rect x="935" y="88" width="100" height="54" class="word-strong"/>
  <rect x="1046" y="88" width="100" height="54" class="word-strong"/>
  <rect x="1157" y="88" width="100" height="54" class="word-strong"/>
  <text x="855" y="123" class="mono">297</text>
  <text x="965" y="123" class="mono">450</text>
  <text x="1075" y="123" class="mono">901</text>
  <text x="1191" y="123" class="mono">389</text>

  <path d="M896 149H969V174H1206V208H1184L1052 304L919 208H896Z" fill="#8b5cf6" fill-opacity=".12" stroke="#6b6b65" stroke-opacity=".35" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <path class="word" d="M852 171H891V227H852Z"/>
    <text x="866" y="207" class="mono-sm">I</text>
    <path class="word" d="M944 184H1024V243H944Z"/>
    <text x="957" y="221" class="mono-sm">love</text>
    <path class="word" d="M1024 209H1148V264H1024Z"/>
    <text x="1044" y="245" class="mono-sm">machine</text>
    <path class="word" d="M1148 232H1267V287H1148Z"/>
    <text x="1162" y="267" class="mono-sm">learning</text>
  </g>

  <path class="word" d="M884 303H1198V380H884Z"/>
  <text x="899" y="337" class="mono-sm">I love machine</text>
  <text x="899" y="363" class="mono-sm">learning</text>

  <g transform="translate(1164 343)">
    <path d="M2 55L18 9L48 39Z" fill="#f59e0b" stroke="#1a1a18" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="27" cy="10" r="4" fill="#0ea5e9" stroke="#1a1a18" stroke-width="3"/>
    <circle cx="41" cy="18" r="4" fill="#10b981" stroke="#1a1a18" stroke-width="3"/>
    <circle cx="52" cy="33" r="4" fill="#f43f5e" stroke="#1a1a18" stroke-width="3"/>
    <circle cx="19" cy="25" r="4" fill="#6366f1" stroke="#1a1a18" stroke-width="3"/>
    <path d="M39 5c10 8-7 14 3 21" fill="none" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>
    <path d="M49 24c13-9 18 4 11 13" fill="none" stroke="#f43f5e" stroke-width="4" stroke-linecap="round"/>
    <path d="M21 41l18-18" stroke="#1a1a18" stroke-width="3"/>
  </g>
</svg>
